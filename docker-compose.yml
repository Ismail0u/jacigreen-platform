services: 
  db:
    image: postgis/postgis:15-3.3
    container_name: jacigreen_db
    environment:
      POSTGRES_DB: jacigreen
      POSTGRES_USER: jacigreen
      POSTGRES_PASSWORD: jacigreen_dev
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jacigreen -d jacigreen"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: jacigreen_redis
    ports:
      - "6380:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:    
  redisdata: 